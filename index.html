<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faucet Simulada</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Bienvenido a la Faucet Simulada</h1>

    <form id="faucetForm">
      <label for="ltcAddress">Dirección LTC:</label>
      <input type="text" id="ltcAddress" placeholder="Introduce tu dirección LTC" required>
      <button type="submit">Verificar</button>
    </form>

    <section id="dashboard" class="hidden">
      <h2>Dashboard</h2>
      <p>Saldo: <span id="balance">0.00 LTC</span></p>
      <button onclick="deposit()">Depositar</button>
      <button onclick="withdraw()">Retirar</button>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
