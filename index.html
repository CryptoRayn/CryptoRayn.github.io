<!DOCTYPE html>
<html lang="es">

    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="container">
        <h1>¡Cryptorayn!</h1>
        <div id="welcome-form">
            <label for="email">Tu Correo Electrónico de FaucetPay:</label>

            <<div class="g-recaptcha" data-sitekey="6LektTQrAAAAACodNVbHkxAatHbRGVG6hv7FYeej"></div>

            <p id="claim-message" class="hidden"></p>
