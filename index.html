<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Faucet de Criptomonedas</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
    <div class="container">
        <h1>¡Reclama tus Criptomonedas!</h1>
        <div id="welcome-form">
            <label for="wallet-address">Tu Dirección de FaucetPay:</label>
            <input type="text" id="wallet-address" placeholder="Ingresa tu dirección aquí">
            <label for="coin">Selecciona la Criptomoneda:</label>
            <select id="coin">
                <option value="BTC">Bitcoin</option>
                <option value="LTC">Litecoin</option>
                <option value="DOGE">Dogecoin</option>
            </select>
            <div class="g-recaptcha" data-sitekey="TU_CLAVE_DE_SITIO_RECAPTCHA"></div>
            <button id="claim-button" disabled>Reclamar Ahora</button>
            <p id="claim-message" class="hidden"></p>
        </div>
        <div id="loading-indicator" class="hidden">
            Cargando...
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        // JavaScript para habilitar el botón de reclamo cuando el reCAPTCHA se resuelve
        function onRecaptchaSuccess() {
            document.getElementById('claim-button').disabled = false;
        }

        function onRecaptchaExpired() {
            document.getElementById('claim-button').disabled = true;
            alert('El reCAPTCHA ha expirado. Por favor, inténtalo de nuevo.');
        }
    </script>
</body>
</html>
