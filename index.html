<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Probar Webhook Make</title>
</head>
<body>
  <h3>Enviar prueba a Webhook de Make</h3>
  <button onclick="enviarPrueba()">Enviar email de prueba</button>
  <p id="resultado"></p>

  <script>
    function enviarPrueba() {
      const webhookUrl = "https://hook.us2.make.com/ldpdob431873o77466jrkaeq4u0qo1l1"; // tu webhook

      fetch(webhookUrl, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email: "prueba@correo.com" })
      })
      .then(res => {
        if (res.ok) {
          document.getElementById("resultado").textContent = "✅ Enviado con éxito.";
        } else {
          document.getElementById("resultado").textContent = "❌ Error en el envío.";
        }
      })
      .catch(err => {
        document.getElementById("resultado").textContent = "❌ Error de red o CORS.";
      });
    }
  </script>
</body>
</html>
