<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Faucet de Criptomonedas</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <script>
      window.RECAPTCHA_SITE_KEY_PUBLIC = "${process.env.RECAPTCHA_SITE_KEY_PUBLIC}";
    </script>
</head>
<body>
    <div class="container">
        <h1>¡Cryptorayn!</h1>
        <div id="welcome-form">
            <label for="email">Tu Correo Electrónico de FaucetPay:</label>
            <input type="email" id="email" placeholder="Ingresa tu correo electrónico de FaucetPay">
            <div class="g-recaptcha"
                 /* Método 2: Usar atributo data */
                 /* data-sitekey="${process.env.RECAPTCHA_SITE_KEY_PUBLIC}" */
                 >
            </div>
            <button id="claim-button" disabled>IR</button>
            <p id="claim-message" class="hidden"></p>
        </div>
        <div id="loading-indicator" class="hidden">
            Cargando...
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        function onRecaptchaSuccess() {
            document.getElementById('claim-button').disabled = false;
        }

        function onRecaptchaExpired() {
            document.getElementById('claim-button').disabled = true;
            alert('El reCAPTCHA ha expirado. Por favor, inténtalo de nuevo.');
        }
    </script>
</body>
</html>
