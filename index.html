<!DOCTYPE html>
<html lang="es">
<head>

  <title>Verificar Dirección LTC</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>

    <h1>Verificar LTC en FaucetPay</h1>

    <div id="recaptcha-container" style="display: none;">
      <div class="g-recaptcha" data-sitekey="6Ldy5TUrAAAAAAsRymlIpZ6DNn0EVeX5-Khdkf2e"></div>
    </div>
    <button id="irButton" disabled>Ir</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
